<!DOCTYPE html>
<html lang="pt">
<head>
  <!-- Codificacao: acentos portugueses aparecem corretos -->
  <meta charset="UTF-8">

  <!-- A meta viewport e o que faz o site funcionar no telemovel.
       Sem ela, o telemovel finge ser um ecra de desktop e encolhe
       tudo para letra ilegivel. E uma linha, e e obrigatoria. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Thiago Portugal | BIM Coordinator</title>

  <!-- Descricao provisoria. O SEO a serio e a P4-C. -->
  <meta name="description" content="Portfolio profissional de Thiago Portugal, BIM Coordinator.">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ESQUELETO P1-B: texto provisorio, so em portugues.
       O seletor de idioma PT/EN e a navegacao entram na P1-C.
       As secoes de conteudo entram na Parte 2.
       A estetica entra na P3-A. Nao inventar visual antes disso. -->

  <header class="cabecalho">
    <h1>Thiago Portugal</h1>
    <p class="subtitulo">BIM Coordinator</p>
  </header>

  <main class="conteudo">
    <section>
      <h2>Em construcao</h2>
      <p>
        Este portfolio esta a ser construido por sessoes. Esta e a
        estrutura minima, publicada para confirmar que o link
        funciona em qualquer dispositivo.
      </p>
      <p>
        Conteudo real, navegacao e versao bilingue chegam nas
        proximas sessoes.
      </p>
    </section>
  </main>

  <footer class="rodape">
    <p>&copy; 2026 Thiago Portugal</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
